<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBAHDRONG V1</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* BACKGROUND */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* LOGIN BOX */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:rgba(20,20,20,0.85);
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.logo{
width:80px;
height:80px;
border-radius:10px;
margin-bottom:10px;
}

h1{
margin:10px 0;
font-size:28px;
}

.sub{
font-size:14px;
color:#bbb;
margin-bottom:20px;
}

/* INPUT */

.input-box{
position:relative;
margin:10px 0;
}

.input-box i{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
color:silver;
}

.input-box input{
width:100%;
padding:12px;
padding-left:35px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
font-size:14px;
box-sizing:border-box;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#2e2e2e,#555,#2e2e2e);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#444;
}

/* VIEW PLANS */

.plans{
margin-top:10px;
background:linear-gradient(90deg,#2e2e2e,#555,#2e2e2e);
padding:12px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:12px;
color:#888;
}

/* LOADING */

#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.loadingBox{
width:220px;
border:1px solid rgba(192,192,192,0.4);
padding:20px;
border-radius:10px;
text-align:center;
background:rgba(20,20,20,0.8);
}

.loadingText{
color:silver;
font-size:14px;
margin-bottom:10px;
}

.progressBar{
width:100%;
height:8px;
background:#333;
border-radius:5px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:silver;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.7);
border:1px solid silver;
border-radius:12px;
padding:16px;
text-align:center;
display:none;
}

.popup h3{
color:silver;
margin-bottom:6px;
}

.popup p{
color:silver;
font-size:12px;
}

.ok-btn{
background:transparent;
border:1px solid silver;
color:silver;
padding:5px 12px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<img src="logo.jpg" class="logo">

<h1>MBAHDRONG V1</h1>

<div class="sub">Welcome to App Gondrong</div>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" id="username" placeholder="Username" onclick="playMusic()">
</div>

<div class="input-box">
<i class="fa-solid fa-key"></i>
<input type="password" id="password" placeholder="Password" onclick="playMusic()">
</div>

<button onclick="login()">
<i class="fa-solid fa-lock"></i> LOGIN NOW
</button>

<div class="plans" onclick="window.location.href='https://wa.me/6283834448873'">
<i class="fa-solid fa-crown"></i> VIEW PLANS & PRICING
</div>

<div class="footer">
© mbahgondrong V1. all rights reserved
</div>

</div>

<div id="loadingScreen">
<div class="loadingBox">

<div class="loadingText">
Please wait for loading
</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

</div>
</div>

<div id="errorBox" class="popup">
<h3>Login Failed</h3>
<p>Username or password is incorrect</p>
</div>

<div id="successBox" class="popup">
<h3>Login Successful</h3>
<p>Welcome back!</p>
<button class="ok-btn" onclick="nextPage()">OK</button>
</div>

<audio id="bgMusic" loop>
<source src="song1.mp3" type="audio/mpeg">
</audio>

<script>

var music=document.getElementById("bgMusic")
music.volume=0.2

function playMusic(){
music.play()
}

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user=="darmaji" && pass=="kacung"){

document.getElementById("loadingScreen").style.display="flex"

let bar=document.getElementById("progress")
let width=0

let load=setInterval(function(){

width++
bar.style.width=width+"%"

if(width>=100){

clearInterval(load)

document.getElementById("loadingScreen").style.display="none"

document.getElementById("successBox").style.display="block"

}

},20)

}else{

let err=document.getElementById("errorBox")

err.style.display="block"

setTimeout(function(){
err.style.display="none"
},2000)

}

}

function nextPage(){
window.location.href="page2.html"
}

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let lines=[]

for(let i=0;i<80;i++){
lines.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<lines.length;i++){

let p=lines[i]

p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

for(let j=i+1;j<lines.length;j++){

let p2=lines[j]

let dist=Math.hypot(p.x-p2.x,p.y-p2.y)

if(dist<120){

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(p2.x,p2.y)
ctx.strokeStyle="rgba(255,255,255,0.1)"
ctx.stroke()

}

}

}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
